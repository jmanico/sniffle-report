name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore backend dependencies
        working-directory: src/backend
        run: dotnet restore SniffleReport.sln

      - name: Build backend
        working-directory: src/backend
        run: dotnet build SniffleReport.sln --configuration Release --no-restore

      - name: Run backend tests
        working-directory: src/backend
        run: dotnet test SniffleReport.sln --configuration Release --no-build

      - name: Check backend packages for vulnerabilities
        run: dotnet list "${{ github.workspace }}/src/backend/SniffleReport.sln" package --vulnerable --include-transitive

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Lint frontend
        working-directory: src/frontend
        run: npm run lint

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Run frontend tests
        working-directory: src/frontend
        run: npm test

      - name: Audit frontend dependencies
        working-directory: src/frontend
        run: npm audit --audit-level=high
